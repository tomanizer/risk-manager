name: drift-monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1-5"
  push:
    branches:
      - main
    paths:
      - ".github/agents/**"
      - ".github/workflows/drift-monitor.yml"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - "agent_runtime/drift/**"
      - "artifacts/drift/README.md"
      - "docs/**"
      - "prompts/**"
      - "scripts/drift/**"
      - "tests/unit/agent_runtime/test_reference_integrity.py"
      - "work_items/**"

jobs:
  reference-integrity:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repo and dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run reference integrity scanner
        run: |
          python scripts/drift/check_references.py \
            --output artifacts/drift/reference_integrity.json

      - name: Run registry alignment scanner
        run: |
          python scripts/drift/check_registry_alignment.py \
            --output artifacts/drift/registry_alignment.json

      - name: Summarize findings
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          lines = [
              "## Drift Monitor",
              "",
          ]
          report_specs = (
              (
                  "Reference Integrity",
                  Path("artifacts/drift/reference_integrity.json"),
                  lambda report: (
                      f"- Files scanned: `{report['stats']['files_scanned']}`",
                      f"- References checked: `{report['stats']['references_checked']}`",
                  ),
                  lambda finding: (
                      f"- `{finding['severity']}` `{finding['source_file']}:{finding['source_line']}` "
                      f"`{finding['reference']}` -> {finding['owner']}"
                  ),
              ),
              (
                  "Registry Alignment",
                  Path("artifacts/drift/registry_alignment.json"),
                  lambda report: (
                      f"- Components scanned: `{report['stats']['components_scanned']}`",
                      f"- Subcomponents scanned: `{report['stats']['subcomponents_scanned']}`",
                      f"- Module roots discovered: `{report['stats']['module_roots_discovered']}`",
                  ),
                  lambda finding: (
                      f"- `{finding['severity']}` `{finding['component_id']}` "
                      f"`{finding['kind']}` -> {finding['owner']}"
                  ),
              ),
          )

          for title, report_path, stat_lines, finding_line in report_specs:
              report = json.loads(report_path.read_text(encoding="utf-8"))
              findings = report["findings"]
              lines.append(f"### {title}")
              lines.append(f"- Scan: `{report['scan_name']}`")
              lines.append(f"- Findings: `{len(findings)}`")
              lines.extend(stat_lines(report))
              if findings:
                  lines.append("- Top findings:")
                  lines.extend(finding_line(finding) for finding in findings[:10])
                  if len(findings) > 10:
                      lines.append(f"- ... and `{len(findings) - 10}` more")
              else:
                  lines.append("- No findings detected.")
              lines.append("")

          summary = "\n".join(lines) + "\n"
          with open(Path.home() / "drift-summary.md", "w", encoding="utf-8") as handle:
              handle.write(summary)
          PY
          cat ~/drift-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload drift artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drift-reports
          path: |
            artifacts/drift/reference_integrity.json
            artifacts/drift/registry_alignment.json
          if-no-files-found: error
