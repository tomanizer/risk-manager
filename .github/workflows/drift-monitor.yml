name: drift-monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1-5"
  push:
    branches:
      - main
    paths:
      - ".github/agents/**"
      - ".github/workflows/drift-monitor.yml"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - "agent_runtime/drift/**"
      - "artifacts/drift/**"
      - "docs/**"
      - "prompts/**"
      - "scripts/drift/**"
      - "tests/unit/agent_runtime/**"
      - "work_items/**"

jobs:
  drift-suite:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repo and dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run deterministic drift suite
        run: |
          python scripts/drift/run_all.py \
            --artifact-dir artifacts/drift \
            --output artifacts/drift/latest_report.json \
            --summary-output artifacts/drift/summary.md

      - name: Summarize findings
        run: cat artifacts/drift/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Render repo-health issue body
        run: |
          python scripts/drift/render_issue_body.py \
            --report artifacts/drift/latest_report.json \
            --output artifacts/drift/issue_body.md

      - name: Create or update repo-health issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const report = JSON.parse(fs.readFileSync("artifacts/drift/latest_report.json", "utf8"));
            const issueBody = fs.readFileSync("artifacts/drift/issue_body.md", "utf8");
            const title = "Repo Health Drift Report";
            const marker = "<!-- drift-monitor-issue -->";

            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "all",
              per_page: 100,
            });

            const existing = issues.find((issue) => !issue.pull_request && issue.title === title && issue.body?.includes(marker));
            const newFindings = report.stats.new_findings;

            if (newFindings > 0) {
              if (existing) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  title,
                  body: issueBody,
                  state: "open",
                });
                core.notice(`Updated repo-health issue #${existing.number}.`);
              } else {
                const { data: created } = await github.rest.issues.create({
                  owner,
                  repo,
                  title,
                  body: issueBody,
                });
                core.notice(`Created repo-health issue #${created.number}.`);
              }
              return;
            }

            if (existing && existing.state === "open") {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: "Closing automatically because the latest drift suite run found zero net-new findings.",
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body: issueBody,
                state: "closed",
              });
              core.notice(`Closed repo-health issue #${existing.number}.`);
            } else {
              core.notice("No net-new drift findings and no open repo-health issue to close.");
            }

      - name: Upload drift artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drift-reports
          path: |
            artifacts/drift/architecture_boundaries.json
            artifacts/drift/canon_lineage.json
            artifacts/drift/dependency_hygiene.json
            artifacts/drift/instruction_surfaces.json
            artifacts/drift/issue_body.md
            artifacts/drift/latest_report.json
            artifacts/drift/reference_integrity.json
            artifacts/drift/registry_alignment.json
            artifacts/drift/summary.md
          if-no-files-found: error
