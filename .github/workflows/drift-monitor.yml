name: drift-monitor

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: "0 2 * * *"    # daily — deterministic suite only
    - cron: "0 3 * * 1"    # weekly Monday — deterministic + synthesis
  push:
    branches:
      - main
    paths:
      - ".github/agents/**"
      - ".github/workflows/drift-monitor.yml"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - "agent_runtime/drift/**"
      - "artifacts/drift/**"
      - "docs/**"
      - "prompts/**"
      - "scripts/drift/**"
      - "tests/unit/agent_runtime/**"
      - "work_items/**"
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    paths:
      - ".github/agents/**"
      - ".github/workflows/drift-monitor.yml"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - "agent_runtime/drift/**"
      - "artifacts/drift/**"
      - "docs/**"
      - "prompts/**"
      - "scripts/drift/**"
      - "tests/unit/agent_runtime/**"
      - "work_items/**"

jobs:
  drift-suite:
    if: >
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'agent-authored')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repo and dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run deterministic drift suite
        run: |
          python scripts/drift/run_all.py \
            --artifact-dir artifacts/drift \
            --output artifacts/drift/latest_report.json \
            --summary-output artifacts/drift/summary.md

      - name: Summarize findings
        run: cat artifacts/drift/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Render repo-health issue body
        run: |
          python scripts/drift/render_issue_body.py \
            --report artifacts/drift/latest_report.json \
            --output artifacts/drift/issue_body.md

      - name: Post drift summary as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const report = JSON.parse(fs.readFileSync("artifacts/drift/latest_report.json", "utf8"));
            const summary = fs.readFileSync("artifacts/drift/summary.md", "utf8");
            const newFindings = report.stats.new_findings;
            const status = newFindings > 0
              ? `⚠️ **${newFindings} net-new drift finding(s) detected.**`
              : "✅ No net-new drift findings.";
            const body = `<!-- drift-pr-comment -->\n## Drift Scan\n\n${status}\n\n${summary}`;

            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            const existing = comments.find((c) => c.body?.includes("<!-- drift-pr-comment -->"));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              core.notice(`Updated drift PR comment on #${prNumber}.`);
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
              core.notice(`Created drift PR comment on #${prNumber}.`);
            }

      - name: Create or update repo-health issue
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const report = JSON.parse(fs.readFileSync("artifacts/drift/latest_report.json", "utf8"));
            const issueBody = fs.readFileSync("artifacts/drift/issue_body.md", "utf8");
            const title = "Repo Health Drift Report";
            const marker = "<!-- drift-monitor-issue -->";

            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "all",
              per_page: 100,
            });

            const existing = issues.find((issue) => !issue.pull_request && issue.title === title && issue.body?.includes(marker));
            const newFindings = report.stats.new_findings;

            if (newFindings > 0) {
              if (existing) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  title,
                  body: issueBody,
                  state: "open",
                });
                core.notice(`Updated repo-health issue #${existing.number}.`);
              } else {
                const { data: created } = await github.rest.issues.create({
                  owner,
                  repo,
                  title,
                  body: issueBody,
                });
                core.notice(`Created repo-health issue #${created.number}.`);
              }
              return;
            }

            if (existing && existing.state === "open") {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: "Closing automatically because the latest drift suite run found zero net-new findings.",
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body: issueBody,
                state: "closed",
              });
              core.notice(`Closed repo-health issue #${existing.number}.`);
            } else {
              core.notice("No net-new drift findings and no open repo-health issue to close.");
            }

      - name: Create drift-fix work item for auto-remediable findings
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require("child_process");
            const fs = require("fs");

            const report = JSON.parse(fs.readFileSync("artifacts/drift/latest_report.json", "utf8"));
            const newFindings = report.stats.new_findings;
            if (newFindings === 0) {
              core.notice("No net-new findings — skipping drift-fix work item check.");
              return;
            }

            const autoRemediableKinds = new Set([
              "missing_agents_reference",
              "missing_drift_suite_entrypoint",
              "stale_drift_monitor_commands",
              "stale_requirements_txt_update_guidance",
            ]);

            const remediable = report.findings.filter((f) => autoRemediableKinds.has(f.kind));
            if (remediable.length === 0) {
              core.notice("No auto-remediable findings — skipping drift-fix work item.");
              return;
            }

            const today = new Date().toISOString().slice(0, 10);
            const workItemPath = `work_items/ready/drift-fix-${today}.md`;
            const { owner, repo } = context.repo;

            // Check if the work item already exists on the remote branch to avoid duplicate commits
            let existingFileSha = null;
            try {
              const { data } = await github.rest.repos.getContent({ owner, repo, path: workItemPath, ref: "main" });
              existingFileSha = data.sha;
            } catch (err) {
              if (err.status !== 404) {
                core.warning(`Unexpected error checking for existing work item: ${err.message}`);
                return;
              }
            }

            if (existingFileSha !== null) {
              core.notice(`Drift-fix work item already exists on main for ${today}. Skipping.`);
              return;
            }

            try {
              execSync(
                `python scripts/drift/create_fix_workitem.py --report artifacts/drift/latest_report.json`,
                { stdio: "inherit" }
              );
            } catch (err) {
              core.warning(`drift-fix work item creation failed: ${err.message}`);
              return;
            }

            if (!fs.existsSync(workItemPath)) {
              core.notice("Script did not produce a work item file (may have skipped for another reason).");
              return;
            }

            const content = fs.readFileSync(workItemPath, "utf8");
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: workItemPath,
              message: `chore: create drift-fix work item for ${today} [skip ci]`,
              content: Buffer.from(content).toString("base64"),
              branch: "main",
            });
            core.notice(`Committed drift-fix work item: ${workItemPath}`);

      - name: Upload drift artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drift-reports
          path: |
            artifacts/drift/architecture_boundaries.json
            artifacts/drift/canon_lineage.json
            artifacts/drift/dependency_hygiene.json
            artifacts/drift/instruction_surfaces.json
            artifacts/drift/issue_body.md
            artifacts/drift/latest_report.json
            artifacts/drift/reference_integrity.json
            artifacts/drift/registry_alignment.json
            artifacts/drift/surface_liveness.json
            artifacts/drift/summary.md
          if-no-files-found: error

  drift-synthesis:
    if: >
      github.event_name == 'schedule' &&
      github.event.schedule == '0 3 * * 1' &&
      needs.drift-suite.result == 'success'
    needs: drift-suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repo and dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download drift artifacts
        uses: actions/download-artifact@v4
        with:
          name: drift-reports
          path: artifacts/drift

      - name: Run LLM drift synthesis
        id: synthesis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set +e
          python scripts/drift/run_synthesis.py \
            --report artifacts/drift/latest_report.json \
            --repo-root . \
            --output artifacts/drift/synthesis.md
          synthesis_exit_code=$?
          set -e

          if [ "$synthesis_exit_code" -eq 0 ]; then
            echo "synthesis_ready=true" >> "$GITHUB_OUTPUT"
          elif [ "$synthesis_exit_code" -eq 2 ]; then
            echo "synthesis_ready=false" >> "$GITHUB_OUTPUT"
            echo "Synthesis skipped: no net-new findings to summarize."
          else
            exit "$synthesis_exit_code"
          fi
        continue-on-error: true

      - name: Append synthesis comment to drift issue
        if: steps.synthesis.outputs.synthesis_ready == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const synthesis = fs.readFileSync("artifacts/drift/synthesis.md", "utf8");
            const { owner, repo } = context.repo;

            // Find the open "Repo Health Drift Report" issue
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", per_page: 100,
            });
            const marker = "<!-- drift-monitor-issue -->";
            const driftIssue = issues.find(
              (i) => !i.pull_request && i.title === "Repo Health Drift Report" && i.body?.includes(marker)
            );

            if (!driftIssue) {
              core.notice("No open drift issue found — skipping synthesis comment.");
              return;
            }

            // Avoid duplicate synthesis comments on the same day
            const synthMarker = "<!-- drift-synthesis -->";
            const today = new Date().toISOString().slice(0, 10);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: driftIssue.number, per_page: 100,
            });
            const existing = comments.find(
              (c) => c.body?.includes(synthMarker) && c.body?.includes(today)
            );
            if (existing) {
              core.notice(`Synthesis comment for ${today} already exists. Skipping.`);
              return;
            }

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: driftIssue.number,
              body: synthesis,
            });
            core.notice(`Appended synthesis comment to issue #${driftIssue.number}.`);

      - name: Upload synthesis artifact
        if: steps.synthesis.outputs.synthesis_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: drift-synthesis
          path: artifacts/drift/synthesis.md
          if-no-files-found: warn
