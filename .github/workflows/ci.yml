name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      skills: ${{ steps.filter.outputs.skills }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed surfaces
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - ".github/workflows/ci.yml"
              - "pyproject.toml"
              - "src/**"
              - "agent_runtime/**"
              - "tests/**"
              - "fixtures/**"
              - "scripts/**"
            skills:
              - ".github/workflows/ci.yml"
              - "skills/**"
              - ".cursor/skills/**"
              - ".claude/commands/**"
              - ".github/skills/**"
              - "scripts/skills/**"

  lint-and-test:
    needs: detect-changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        if: needs.detect-changes.outputs.python == 'true' || needs.detect-changes.outputs.skills == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install tooling
        if: needs.detect-changes.outputs.python == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install skill tooling
        if: needs.detect-changes.outputs.python != 'true' && needs.detect-changes.outputs.skills == 'true'
        run: |
          python -m pip install --upgrade pip

      - name: Run push gate
        if: needs.detect-changes.outputs.python == 'true' || needs.detect-changes.outputs.skills == 'true'
        run: |
          args=()
          if [ "${{ needs.detect-changes.outputs.python }}" = "true" ]; then
            args+=(--python)
          fi
          if [ "${{ needs.detect-changes.outputs.skills }}" = "true" ]; then
            args+=(--skills)
          fi
          python scripts/ci/run_push_gate.py "${args[@]}"

      - name: No relevant CI work
        if: needs.detect-changes.outputs.python != 'true' && needs.detect-changes.outputs.skills != 'true'
        run: |
          echo 'No Python or skill changes detected. Skipping heavy CI steps.'
