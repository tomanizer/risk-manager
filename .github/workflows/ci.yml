name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: |
          if git ls-files '*.py' '*.pyi' | grep . >/dev/null; then
            ruff check .
          else
            echo 'No Python files found. Skipping Ruff.'
          fi

      - name: Mypy
        run: |
          if git ls-files '*.py' '*.pyi' | grep . >/dev/null; then
            mypy src/
          else
            echo 'No Python files found. Skipping mypy.'
          fi

      - name: Pytest
        run: |
          if git ls-files 'tests/**/*.py' 'test_*.py' '*_test.py' | grep . >/dev/null; then
            pytest -q
          else
            echo 'No Python tests found. Skipping pytest.'
          fi
