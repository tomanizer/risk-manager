version: 2
last_updated: 2026-04-20
# PM boundary decisions recorded inline; see closed_decisions at module dashboard level.

module_dashboards:
  - id: MODULE-1-VAR
    name: "Module 1 Dashboard: End-to-End VaR Workflow"
    owner_role: PM / Coordination Agent
    dashboard_path: docs/roadmap/module_1_var_dashboard.md
    overall_state: MVP_PARTIAL
    delivery_phase: Phase 5
    mission: >-
      Deliver a replayable, deterministic, explainable daily VaR investigation
      workflow for Module 1 using governed deterministic services, specialist
      walkers, and bounded orchestration.
    mvp_definition:
      - deterministic VaR retrieval and change-profile analysis
      - trust / readiness assessment
      - quantitative interpretation
      - time-series interpretation
      - orchestrated investigation flow
      - governance-ready handoff output
    summary: >-
      Deterministic risk analytics and controls-integrity foundations are
      implemented. The bounded daily orchestrator exists. Multi-walker
      analytical interpretation and governance-ready output are still missing.
    current_mvp_blockers:
      - Quant Walker v2 contract is not yet defined.
      - Time Series Walker v1 implementation (PRD-4.3) is not yet on main.
      - Daily Risk Investigation Orchestrator v2 multi-walker routing is missing.
    not_required_for_mvp:
      - Market Context Walker
      - Critic / Challenge Walker
      - Human workflow / UX layer
      - Advanced production scheduling
      - Live-data integration and production database adapter (PM decision 2026-04-19 — post-MVP; near-term priority)
      - Governance / Reporting Walker v1 (PM decision 2026-04-19 — typed handoff sufficient for MVP; near-term post-MVP)
    journey_stages:
      - id: deterministic_foundation
        label: Deterministic foundation
        goal: canonical deterministic VaR analytics
        status: done
        notes: Risk Analytics and Controls Integrity deterministic services are implemented.
      - id: trust_gate
        label: Trust / controls gate
        goal: determine whether data is safe to interpret
        status: done
        notes: Data Controller Walker and bounded trust-gate orchestration exist.
      - id: analytical_interpretation
        label: Analytical interpretation
        goal: explain quantitative movement and historical context
        status: partial
        notes: >-
          Quant Walker exists as a delegate only; Time Series Walker v1 is specified
          by PRD-4.3 but implementation is not yet on main.
      - id: workflow_orchestration
        label: Workflow orchestration
        goal: route, synthesize, challenge, and hand off the investigation
        status: partial
        notes: Daily orchestrator exists but is single-walker only.
      - id: governance_handoff
        label: Governance-ready handoff
        goal: produce management-ready conclusions and actions
        status: not_started
        notes: Governance / Reporting Walker is not implemented.
      - id: production_operation
        label: Production operation
        goal: durable, repeatable, live execution
        status: not_started
        notes: Durable persistence and live execution contracts are not yet implemented.
    capabilities:
      - component_ref: MOD-RISK-ANALYTICS
        layer: module
        current_state: implemented
        implemented_now:
          - get_risk_summary
          - get_risk_delta
          - get_risk_history
          - get_risk_change_profile
          - fixture loader and business-day resolver
        missing_for_mvp: []
        missing_prds: []
        needs_new_prd_version: false
        next_version_reason: ""
        next_slice: "No MVP gap. Production data integration is post-MVP (PM decision 2026-04-19 — DECISION-MVP-01)."
      - component_ref: MOD-CONTROLS-INTEGRITY
        layer: module
        current_state: implemented
        implemented_now:
          - IntegrityAssessment service
          - shared evidence refs
          - replay and validation coverage
        missing_for_mvp:
          - none
        missing_prds: []
        needs_new_prd_version: false
        next_version_reason: ""
        next_slice: No immediate MVP gap; extend only if new control families are required.
      - component_ref: WALKER-DATA-CONTROLLER
        layer: walker
        current_state: implemented
        implemented_now:
          - assess_integrity delegate
          - walker telemetry
        missing_for_mvp:
          - none
        missing_prds: []
        needs_new_prd_version: false
        next_version_reason: ""
        next_slice: Keep stable unless downstream consumers require richer walker-owned output.
      - component_ref: WALKER-QUANT
        layer: walker
        current_state: delegate_only
        implemented_now:
          - summarize_change delegate over get_risk_change_profile
        missing_for_mvp:
          - interpretive quantitative walker output
        missing_prds: []
        needs_new_prd_version: true
        next_version_reason: >-
          Current PRD covers delegation-only v1. Module 1 MVP needs actual
          walker inference over deterministic risk change output.
        next_slice: Author PRD-4.2-v2 for interpretive Quant Walker output.
      - component_ref: WALKER-TIME-SERIES
        layer: walker
        current_state: not_started
        implemented_now: []
        missing_for_mvp:
          - full time-series interpretation capability
        missing_prds: []
        needs_new_prd_version: false
        next_version_reason: >-
          PRD-4.3 is the v1 contract; implementation (WI-4.3.1–WI-4.3.4) is not yet on main.
        next_slice: Deliver WI-4.3.1–WI-4.3.4 per PRD-4.3.
      - component_ref: ORCH-DAILY-RISK-INVESTIGATION
        layer: orchestrator
        current_state: partial
        implemented_now:
          - bounded single-walker daily run
          - target selection
          - challenge gate
          - typed handoff
          - shared telemetry
        missing_for_mvp:
          - multi-walker routing
          - multi-walker synthesis
          - governance-ready downstream path
        missing_prds: []
        needs_new_prd_version: true
        next_version_reason: >-
          PRD-5.1 intentionally excludes quant/time-series routing and richer
          orchestration behavior required for Module 1 MVP.
        next_slice: Author PRD-5.1-v2 for multi-walker orchestration.
      - component_ref: WALKER-GOVERNANCE-REPORTING
        layer: walker
        current_state: not_started
        implemented_now: []
        missing_for_mvp: []
        missing_prds:
          - PRD-TBD-Governance-Reporting-Walker-v1
        needs_new_prd_version: true
        next_version_reason: >-
          Post-MVP (PM decision 2026-04-19). Typed DailyRunResult handoff is sufficient
          for MVP. Governance Walker input types still depend on Quant Walker v2 output
          contracts; Time Series Walker v1 is specified by PRD-4.3 (implementation pending).
        next_slice: >-
          Post-MVP (near-term) — author Governance / Reporting Walker v1 PRD after Quant
          Walker v2 PRD is settled (Time Series Walker v1 contract is PRD-4.3).
      - name: Production integration
        layer: cross-cutting
        current_state: not_started
        implemented_now: []
        missing_for_mvp: []
        missing_prds:
          - PRD-TBD-Module-1-Production-Integration
        needs_new_prd_version: true
        next_version_reason: >-
          Post-MVP (PM decision 2026-04-19). MVP is fixture-backed and operator-invoked.
          Live-data integration and database persistence are a near-term post-MVP priority.
        next_slice: >-
          Post-MVP — author production integration PRD after Quant Walker v2 is contracted
          (Time Series Walker v1 contract is PRD-4.3).
    prd_lineage:
      - capability: Risk Analytics
        active_prd: PRD-1.1-v2
        status: active
        supersedes: PRD-1.1-v1
        next_needed_prd: ""
        why: Current deterministic bounded scope is stable.
      - capability: Controls Integrity
        active_prd: PRD-2.1
        status: active
        supersedes: ""
        next_needed_prd: ""
        why: Current bounded trust-assessment scope is stable.
      - capability: Data Controller Walker
        active_prd: PRD-4.1
        status: active
        supersedes: ""
        next_needed_prd: ""
        why: v1 delegate is sufficient for the current trust-gate role.
      - capability: Quant Walker
        active_prd: PRD-4.2
        status: active
        supersedes: ""
        next_needed_prd: PRD-4.2-v2
        why: v1 is delegation-only; Module 1 MVP needs interpretive walker output.
      - capability: Time Series Walker
        active_prd: PRD-4.3
        status: active
        supersedes: ""
        next_needed_prd: ""
        why: >-
          v1 contract is PRD-4.3; implementation (WI-4.3.x) is outstanding on main.
      - capability: Daily Risk Investigation Orchestrator
        active_prd: PRD-5.1
        status: active
        supersedes: ""
        next_needed_prd: PRD-5.1-v2
        why: Current orchestrator is bounded to a single-walker flow.
      - capability: Governance / Reporting Walker
        active_prd: ""
        status: missing
        supersedes: ""
        next_needed_prd: PRD-TBD-Governance-Reporting-Walker-v1
        why: >-
          Post-MVP (near-term). Typed handoff sufficient for MVP per PM decision 2026-04-19;
          PRD to be authored after Quant Walker v2 is contracted (Time Series Walker v1 is PRD-4.3).
    in_progress_items: []
    next_recommended_slices:
      - "Deliver WI-5.1.4 (replay determinism tests) — Coding Agent, no blockers."
      - "Author PRD-4.2-v2 for interpretive Quant Walker output — PRD / Spec Author."
      - "Deliver WI-4.3.1–WI-4.3.4 per PRD-4.3 (Time Series Walker v1) — Coding Agent, after PRD merge."
      - "Author PRD-5.1-v2 for multi-walker orchestration — PRD / Spec Author (after Quant Walker v2 output types are defined)."
      - "[Post-MVP] Author Governance / Reporting Walker v1 PRD after Quant Walker v2 is contracted (Time Series v1 is PRD-4.3)."
      - "[Post-MVP near-term priority] Author production integration PRD for live-data and database persistence."
    post_mvp_enhancements:
      - Live-data integration and production database adapter (near-term priority — see closed decision DECISION-MVP-01)
      - Governance / Reporting Walker v1 (near-term — see closed decision DECISION-MVP-02)
      - Market Context Walker
      - Critic / Challenge Walker
      - Human workflow and UX layer
      - richer production operations and scheduling
    open_questions: []
    closed_decisions:
      - id: DECISION-MVP-01
        date: "2026-04-19"
        question: "Is live-data integration inside Module 1 MVP or immediately post-MVP?"
        decision: >-
          Post-MVP. MVP is fixture-backed, operator-invoked execution only.
          Live-data integration and database persistence are explicitly deferred
          to the post-MVP production operations stage.
        rationale: >-
          Narrowest path consistent with ADR-002 replay-first discipline. The
          analytical interpretation layer (Quant Walker v2, Time Series Walker v1)
          can be fully contracted and delivered without a live-data adapter.
        note: >-
          Live-data and database persistence must be implemented as a near-term
          post-MVP priority. Do not delay this indefinitely after MVP closes.
      - id: DECISION-MVP-02
        date: "2026-04-19"
        question: "Is Governance / Reporting Walker required for MVP or can typed handoff suffice?"
        decision: >-
          Typed handoff is sufficient for MVP. The DailyRunResult with
          TargetHandoffEntry objects (handoff_status, blocking_reason_codes,
          cautionary_reason_codes) constitutes a machine-readable governance-ready
          handoff. Governance / Reporting Walker is deferred to near-term post-MVP.
        rationale: >-
          Governance Walker input types still depend on Quant Walker v2 typed outputs,
          which are not yet contracted; Time Series Walker v1 is specified by PRD-4.3
          (implementation pending). Authoring Governance PRD before Quant v2 contracts
          exist would require speculating on part of the input surface. Defer until
          Quant Walker v2 PRD is settled alongside PRD-4.3.
        note: >-
          Governance / Reporting Walker v1 PRD should be authored immediately after
          Quant Walker v2 PRD is in draft alongside PRD-4.3, not after all implementations
          are complete.
    change_log:
      - "2026-04-19: Initial Module 1 dashboard seed added to the registry."
      - "2026-04-19: PM decision DECISION-MVP-01 — MVP is fixture-backed only; live-data is post-MVP near-term priority."
      - "2026-04-19: PM decision DECISION-MVP-02 — typed handoff sufficient for MVP; Governance Walker deferred to near-term post-MVP."
      - "2026-04-20: Time Series Walker v1 contract recorded as PRD-4.3; registry and dashboard lineage replace PRD-TBD-Time-Series-Walker-v1."

